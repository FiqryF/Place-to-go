name: Add Place
description: Add a new destination to Place To Go
title: "[Place] "
labels: ["place"]
body:
  - type: input
    id: place_name
    attributes:
      label: Place name
      description: The name of the place.
      placeholder: "Ubud Art Market"
    validations:
      required: true
  - type: input
    id: location
    attributes:
      label: Location
      description: City, region, or country.
      placeholder: "Ubud, Bali"
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Beach
        - Cafe
        - City Walk
        - Culture
        - Food
        - Nature
        - Stay
        - Other
    validations:
      required: true
  - type: textarea
    id: short_description
    attributes:
      label: Short description
      description: A short reason why this place belongs on the list.
      placeholder: "A quiet place for a slow morning walk."
    validations:
      required: true
  - type: input
    id: google_maps_url
    attributes:
      label: Google Maps URL
      description: Paste the Google Maps link.
      placeholder: "https://www.google.com/maps/place/..."
    validations:
      required: true
  - type: input
    id: cover_image_url
    attributes:
      label: Cover image URL
      description: Paste an optimized public image URL.
      placeholder: "https://images.unsplash.com/..."
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Optional private-style notes for the detail page.
      placeholder: "Best time to visit, ticket notes, or small reminders."
    validations:
      required: false
