<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Manage Place To Go places.">
    <title>Manage - Place To Go</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body class="manage-page">
    <main class="app-shell manage-shell">
      <nav class="topbar manage-topbar" aria-label="Primary">
        <a class="icon-link" href="home.html" aria-label="Back to home">
          <i data-lucide="arrow-left"></i>
        </a>
      </nav>

      <section class="add-hero">
        <p class="eyebrow">User space</p>
        <h1>Manage places</h1>
        <p class="intro-copy">Tambah, edit, atau hapus wishlist kecil kita.</p>
      </section>

      <section class="status-message" id="manageStatus" hidden></section>

      <section class="admin-menu">
        <a class="admin-menu-item" href="add.html">
          <span><i data-lucide="plus"></i></span>
          <div>
            <h2>Add place</h2>
            <p>Simpan tempat baru lengkap dengan foto, lokasi, dan kategori.</p>
          </div>
          <i data-lucide="arrow-up-right"></i>
        </a>
      </section>

      <section class="section-heading admin-heading">
        <div>
          <p class="eyebrow">Places</p>
          <h2>All places</h2>
        </div>
        <button class="ghost-button" id="refreshManageButton" type="button">
          <i data-lucide="refresh-cw"></i>
          <span>Refresh</span>
        </button>
      </section>

      <section class="admin-list" id="manageList" aria-live="polite"></section>
    </main>

    <script src="https://unpkg.com/lucide@1.25.0/dist/umd/lucide.min.js" integrity="sha384-UoXAhqcCCjwD94x4CCSExEHvtO49AfNiY7g/IxDgrPtx4U6o6tvy1cScx9v/RrS9" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.7" integrity="sha384-BmlQlKlDvXvKoxkn5OQuUo/aJQCTXeB+Kls6EccBmG4Kf8AXvp89RtO9MtPxP/r5" crossorigin="anonymous"></script>
    <script src="js/config.js"></script>
    <script src="js/data.js"></script>
    <script src="js/manage.js"></script>
  </body>
</html>
