<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="All wishlist and visited places for Place To Go.">
    <title>All Places - Place To Go</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body class="places-page">
    <main class="app-shell places-shell">
      <nav class="topbar places-topbar" aria-label="Primary">
        <a class="icon-link" href="home.html" aria-label="Back to home">
          <i data-lucide="arrow-left"></i>
        </a>
      </nav>

      <section class="places-hero">
        <p class="eyebrow">Saved places</p>
        <h1>Wishlist &amp; Visited</h1>
        <p class="intro-copy">Semua tempat yang pengen kita kunjungi dan yang sudah jadi memori.</p>
      </section>

      <section class="controls places-controls" aria-label="Search places">
        <label class="search-box" for="placesSearchInput">
          <span class="sr-only">Search place or city</span>
          <i data-lucide="search"></i>
          <input id="placesSearchInput" type="search" placeholder="Search place or city" autocomplete="off">
        </label>
        <div class="places-jump-row" role="tablist" aria-label="Choose places section">
          <button class="active" type="button" data-view="wishlist">Wishlist</button>
          <button type="button" data-view="visited">Visited</button>
        </div>
      </section>

      <section class="status-message" id="placesStatus" hidden></section>
      <section class="status-message" id="placesEmpty" hidden>No places match this search.</section>

      <section class="full-section" id="wishlistSection" aria-labelledby="wishlistHeading">
        <div class="full-section-heading">
          <div>
            <p class="eyebrow">Wishlist</p>
            <h2 id="wishlistHeading">Places to go</h2>
          </div>
          <span id="wishlistTotal">0</span>
        </div>
        <section class="full-places-grid" id="wishlistList" aria-live="polite"></section>
      </section>

      <section class="full-section" id="visitedSection" aria-labelledby="visitedHeading">
        <div class="full-section-heading">
          <div>
            <p class="eyebrow">Visited</p>
            <h2 id="visitedHeading">Places we visited</h2>
          </div>
          <span id="visitedTotal">0</span>
        </div>
        <section class="full-places-grid" id="visitedList" aria-live="polite"></section>
      </section>
      <footer class="app-footer">
        <p>&copy; 2026 Place To Go</p>
      </footer>
    </main>

    <template id="fullPlaceCardTemplate">
      <article class="place-card">
        <a class="cover-link" href="#">
          <img class="place-cover" src="" alt="" loading="lazy">
          <span class="status-badge"></span>
        </a>
        <div class="place-content">
          <div class="place-meta">
            <span class="category-pill"></span>
            <span class="location-text"><i data-lucide="map-pin"></i><span></span></span>
          </div>
          <h3>Place title</h3>
          <p class="description"></p>
          <div class="card-actions">
            <a class="button secondary maps-link" href="#" target="_blank" rel="noreferrer">
              <i data-lucide="map"></i>
              <span>Maps</span>
            </a>
            <a class="button primary detail-link" href="#">
              <span>Detail</span>
              <i data-lucide="arrow-up-right"></i>
            </a>
          </div>
        </div>
      </article>
    </template>

    <script src="https://unpkg.com/lucide@1.25.0/dist/umd/lucide.min.js" integrity="sha384-UoXAhqcCCjwD94x4CCSExEHvtO49AfNiY7g/IxDgrPtx4U6o6tvy1cScx9v/RrS9" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.7" integrity="sha384-BmlQlKlDvXvKoxkn5OQuUo/aJQCTXeB+Kls6EccBmG4Kf8AXvp89RtO9MtPxP/r5" crossorigin="anonymous"></script>
    <script src="js/config.js"></script>
    <script src="js/data.js"></script>
    <script src="js/places.js"></script>
  </body>
</html>
