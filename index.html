<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Welcome to Place To Go.">
    <title>Place To Go</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body class="welcome-page">
    <main class="app-shell">
      <section class="welcome-screen">
        <div class="welcome-card">
          <p class="eyebrow">Place To Go</p>
          <h1>Hii, kita mau kemana hari ini?</h1>
          <p>Masuk dulu untuk membuka wishlist kecil kita, dari tempat impian sampai momen yang nanti jadi cerita.</p>
          <a class="button primary wide-button welcome-login-button" href="login.html">
            <span>Login</span>
          </a>
        </div>
      </section>
    </main>

    <script src="https://unpkg.com/lucide@1.25.0/dist/umd/lucide.min.js" integrity="sha384-UoXAhqcCCjwD94x4CCSExEHvtO49AfNiY7g/IxDgrPtx4U6o6tvy1cScx9v/RrS9" crossorigin="anonymous"></script>
    <script>
      if (window.lucide) window.lucide.createIcons();

      const loginLink = document.querySelector(".welcome-login-button");
      loginLink.addEventListener("click", (event) => {
        event.preventDefault();
        document.body.classList.add("page-leaving");
        window.setTimeout(() => {
          window.location.href = loginLink.href;
        }, 260);
      });
    </script>
  </body>
</html>
