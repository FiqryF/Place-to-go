<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="The places Fiqry & Isyana want to visit.">
  <title>Home - Place To Go</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="home-page">
  <main class="app-shell">
      <header class="hero">
        <nav class="topbar" aria-label="Primary">
          <a class="brand home-brand" href="home.html" aria-label="Place To Go home">
            <span>Place To Go</span>
          </a>
          <details class="user-menu" id="userMenu">
            <summary class="icon-link profile-menu-button" aria-label="Open user menu">
              <i data-lucide="user-round"></i>
            </summary>
            <div class="user-menu-panel" id="userMenuPanel">
              <a href="manage.html">
                <i data-lucide="plus"></i>
                <span>Add place</span>
              </a>
              <button type="button" id="logoutButton">
                <i data-lucide="log-out"></i>
                <span>Logout</span>
              </button>
            </div>
          </details>
        </nav>

      <section class="intro" aria-labelledby="pageTitle">
        <div class="intro-copy-wrap">
          <h1 id="pageTitle">Place To Go</h1>
          <p class="eyebrow">Today</p>
          <p class="intro-copy">Wishlist kecil kita buat tempat yang pengen dikunjungi.</p>
        </div>
      </section>

      <section class="stats-grid" aria-label="Place statistics">
        <article class="stat-card">
          <i data-lucide="map-pin"></i>
          <span class="stat-value" id="totalCount">0</span>
          <span class="stat-label">Total Places</span>
        </article>
        <article class="stat-card">
          <i data-lucide="heart"></i>
          <span class="stat-value" id="wishlistCount">0</span>
          <span class="stat-label">Wishlist</span>
        </article>
        <article class="stat-card">
          <i data-lucide="check-circle-2"></i>
          <span class="stat-value" id="visitedCount">0</span>
          <span class="stat-label">Visited</span>
        </article>
      </section>
    </header>

    <section class="controls" aria-label="Search and filter">
      <label class="search-box" for="searchInput">
        <i data-lucide="search"></i>
        <input id="searchInput" type="search" placeholder="Search place or city" autocomplete="off">
      </label>

      <div class="filter-row" role="tablist" aria-label="Filter places">
        <button class="filter-chip" type="button" data-filter="all">All</button>
        <button class="filter-chip active" type="button" data-filter="wishlist">Wishlist</button>
        <button class="filter-chip" type="button" data-filter="visited">Visited</button>
      </div>
    </section>

    <section class="section-heading">
      <div>
        <p class="eyebrow">Saved places</p>
        <h2 id="listTitle">Wishlist</h2>
      </div>
      <button class="ghost-button" id="refreshButton" type="button">
        <i data-lucide="refresh-cw"></i>
        <span>Refresh</span>
      </button>
    </section>

    <section class="status-message" id="statusMessage" hidden></section>
    <section class="places-list" id="placesList" aria-live="polite"></section>
    <button class="see-all-button" id="seeAllButton" type="button" hidden>
      <span>See all</span>
      <i data-lucide="chevrons-down"></i>
    </button>

    <section class="confirm-dialog" id="logoutDialog" aria-labelledby="logoutDialogTitle" aria-modal="true"
      role="dialog" hidden>
      <div class="confirm-backdrop"></div>
      <div class="confirm-card">
        <span class="brand-mark confirm-icon"><i data-lucide="log-out"></i></span>
        <h2 id="logoutDialogTitle">Yakin mau logout?</h2>
        <p>Kalau logout, kamu akan kembali ke halaman welcome.</p>
        <div class="confirm-actions">
          <button class="button secondary" id="cancelLogoutButton" type="button">Tidak</button>
          <button class="button danger" id="confirmLogoutButton" type="button">Yakin</button>
        </div>
      </div>
    </section>
  </main>

  <template id="placeCardTemplate">
    <article class="place-card">
      <a class="cover-link" href="#">
        <img class="place-cover" src="" alt="" loading="lazy">
        <span class="status-badge"></span>
      </a>
      <div class="place-content">
        <div class="place-meta">
          <span class="category-pill"></span>
          <span class="location-text"><i data-lucide="map-pin"></i><span></span></span>
        </div>
        <h3></h3>
        <p class="description"></p>
        <div class="card-actions">
          <a class="button secondary maps-link" href="#" target="_blank" rel="noreferrer">
            <i data-lucide="map"></i>
            <span>Maps</span>
          </a>
          <a class="button primary detail-link" href="#">
            <span>Detail</span>
            <i data-lucide="arrow-up-right"></i>
          </a>
        </div>
      </div>
    </article>
  </template>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
