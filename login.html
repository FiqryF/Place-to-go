<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Login for Place To Go.">
    <title>Login - Place To Go</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body>
    <main class="app-shell detail-shell">
      <nav class="topbar detail-topbar" aria-label="Primary">
        <a class="icon-link" href="index.html" aria-label="Back to places">
          <i data-lucide="arrow-left"></i>
        </a>
        <a class="brand compact" href="index.html">
          <span class="brand-mark"><i data-lucide="compass"></i></span>
          <span>Place To Go</span>
        </a>
      </nav>

      <section class="add-hero">
        <p class="eyebrow">Welcome back</p>
        <h1>Login to open our places.</h1>
        <p class="intro-copy">Masuk untuk melihat wishlist, menambah tempat, dan menyimpan momen visited.</p>
      </section>

      <section class="status-message" id="loginStatus" role="status" hidden></section>

      <form class="place-form" id="loginForm">
        <label>
          <span>Email</span>
          <input id="emailInput" name="email" type="email" autocomplete="email" required>
        </label>
        <label>
          <span>Password</span>
          <input id="passwordInput" name="password" type="password" autocomplete="current-password" required>
        </label>
        <button class="button primary wide-button" type="submit">
          <i data-lucide="log-in"></i>
          <span>Login</span>
        </button>
      </form>
    </main>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/data.js"></script>
    <script src="js/login.js"></script>
  </body>
</html>
