<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Login for Place To Go.">
    <title>Login - Place To Go</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body class="login-page">
    <main class="app-shell login-shell">
      <nav class="login-nav" aria-label="Primary">
        <a class="login-back" href="index.html" aria-label="Back to welcome">
          <i data-lucide="arrow-left"></i>
        </a>
        <p>Place To Go</p>
      </nav>

      <section class="login-hero" aria-labelledby="loginTitle">
        <div class="login-avatar" aria-hidden="true">
          <span class="avatar-head"></span>
          <span class="avatar-ear left"></span>
          <span class="avatar-ear right"></span>
          <span class="avatar-body"></span>
        </div>
        <h1 id="loginTitle">Masuk ke wishlist kita</h1>
        <p>Buka daftar tempat, tambah rencana baru, dan simpan momen visited.</p>
      </section>

      <output class="status-message" id="loginStatus" hidden></output>

      <form class="login-form" id="loginForm">
        <label>
          <span>Email address</span>
          <input id="emailInput" name="email" type="email" autocomplete="email" required>
        </label>
        <label>
          <span>Password</span>
          <input id="passwordInput" name="password" type="password" autocomplete="current-password" required>
        </label>
        <label class="remember-row">
          <input type="checkbox" name="remember">
          <span>Remember me</span>
        </label>
        <button class="login-submit" type="submit">
          <span>Login</span>
        </button>
      </form>
    </main>

    <script src="https://unpkg.com/lucide@1.25.0/dist/umd/lucide.min.js" integrity="sha384-UoXAhqcCCjwD94x4CCSExEHvtO49AfNiY7g/IxDgrPtx4U6o6tvy1cScx9v/RrS9" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.7" integrity="sha384-BmlQlKlDvXvKoxkn5OQuUo/aJQCTXeB+Kls6EccBmG4Kf8AXvp89RtO9MtPxP/r5" crossorigin="anonymous"></script>
    <script src="js/config.js"></script>
    <script src="js/data.js"></script>
    <script src="js/login.js"></script>
  </body>
</html>
