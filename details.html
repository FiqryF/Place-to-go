<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Place detail for Place To Go.">
    <title>Place Detail - Place To Go</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body class="detail-page">
    <main class="app-shell detail-shell">
      <nav class="topbar detail-topbar" aria-label="Primary">
        <a class="icon-link" href="home.html" aria-label="Back to places">
          <i data-lucide="arrow-left"></i>
        </a>
      </nav>

      <output class="detail-toast" id="detailStatus" hidden></output>
      <article class="detail-view" id="detailView" hidden>
        <div class="detail-cover-wrap">
          <img class="detail-cover" id="detailCover" src="" alt="">
          <span class="status-badge detail-badge" id="detailBadge"></span>
        </div>

        <section class="detail-content">
          <div class="place-meta">
            <span class="category-pill" id="detailCategory"></span>
            <span class="location-text"><i data-lucide="map-pin"></i><span id="detailLocation"></span></span>
          </div>
          <h1 id="detailName">Place detail</h1>
          <p class="description large" id="detailDescription"></p>
          <dl class="detail-facts">
            <div>
              <dt>Status</dt>
              <dd id="detailStatusText"></dd>
            </div>
            <div>
              <dt>Dibuat</dt>
              <dd id="detailCreated"></dd>
            </div>
          </dl>
          <dl class="detail-facts visit-facts" id="visitFacts">
            <div>
              <dt>Dikunjungi</dt>
              <dd id="detailVisitedDate"></dd>
            </div>
            <div>
              <dt>Rating</dt>
              <dd id="detailRatings"></dd>
            </div>
          </dl>

          <div class="mood-checklist" aria-label="Fiqry and Isyana visit mood">
            <article class="mood-card bf-mood">
              <div class="mood-card-head">
                <span class="mood-icon"><i data-lucide="sparkles"></i></span>
                <p>Fiqry</p>
              </div>
              <h3 id="bfMoodText">Ready for next trip</h3>
              <span class="mood-score" id="bfMoodScore">Saved for us</span>
              <small id="bfMoodNote"><strong>Review</strong><span></span></small>
            </article>
            <article class="mood-card gf-mood">
              <div class="mood-card-head">
                <span class="mood-icon"><i data-lucide="heart"></i></span>
                <p>Isyana</p>
              </div>
              <h3 id="gfMoodText">Ready for next trip</h3>
              <span class="mood-score" id="gfMoodScore">Waiting list</span>
              <small id="gfMoodNote"><strong>Review</strong><span></span></small>
            </article>
          </div>

          <div class="detail-actions">
            <a class="button primary" id="detailMaps" href="#" target="_blank" rel="noreferrer">
              <i data-lucide="map"></i>
              <span>Open Google Maps</span>
            </a>
            <button class="button visited-action" id="detailVisitedButton" type="button">
              <i data-lucide="check-circle-2"></i>
              <span>Visited</span>
            </button>
          </div>

          <footer class="app-footer">
            <p>&copy; 2026 Place To Go</p>
          </footer>
        </section>
      </article>

      <section class="visit-sheet" id="visitSheet" hidden>
        <button class="sheet-backdrop" id="visitSheetBackdrop" type="button" aria-label="Close visited form"></button>
        <div class="visit-form sheet-panel" id="visitForm">
          <div class="sheet-handle"></div>
          <div class="sheet-title">
            <p class="eyebrow">Visited moment</p>
            <h2>Kapan kita ke sini?</h2>
          </div>
          <label class="visit-date-field">
            <span>Tanggal kunjungan</span>
            <input id="visitedDateInput" type="date" required>
          </label>
          <output class="sheet-status" id="visitSheetStatus" hidden></output>
          <fieldset class="rating-picker" data-person="fiqry">
            <legend>Rating Fiqry</legend>
            <div class="rating-buttons">
              <button type="button" data-rating="1" aria-label="Fiqry rating 1">&#9733;</button>
              <button type="button" data-rating="2" aria-label="Fiqry rating 2">&#9733;</button>
              <button type="button" data-rating="3" aria-label="Fiqry rating 3">&#9733;</button>
              <button type="button" data-rating="4" aria-label="Fiqry rating 4">&#9733;</button>
              <button type="button" data-rating="5" aria-label="Fiqry rating 5">&#9733;</button>
            </div>
            <label class="review-field">
              <span>Review Fiqry</span>
              <textarea id="fiqryNoteInput" rows="2" maxlength="220" placeholder="Review tempat dari Fiqry..."></textarea>
            </label>
            <button class="button primary reviewer-save" id="saveFiqryReviewButton" type="button" data-reviewer="fiqry">
              <i data-lucide="save"></i>
              <span>Save Fiqry</span>
            </button>
          </fieldset>
          <fieldset class="rating-picker" data-person="isyana">
            <legend>Rating Isyana</legend>
            <div class="rating-buttons">
              <button type="button" data-rating="1" aria-label="Isyana rating 1">&#9733;</button>
              <button type="button" data-rating="2" aria-label="Isyana rating 2">&#9733;</button>
              <button type="button" data-rating="3" aria-label="Isyana rating 3">&#9733;</button>
              <button type="button" data-rating="4" aria-label="Isyana rating 4">&#9733;</button>
              <button type="button" data-rating="5" aria-label="Isyana rating 5">&#9733;</button>
            </div>
            <label class="review-field">
              <span>Review Isyana</span>
              <textarea id="isyanaNoteInput" rows="2" maxlength="220" placeholder="Review tempat dari Isyana..."></textarea>
            </label>
            <button class="button primary reviewer-save" id="saveIsyanaReviewButton" type="button" data-reviewer="isyana">
              <i data-lucide="save"></i>
              <span>Save Isyana</span>
            </button>
          </fieldset>
          <div class="sheet-actions">
            <button class="button secondary wide-button" id="cancelVisitButton" type="button">Cancel</button>
          </div>
        </div>
      </section>

      <section class="visited-celebration" id="visitedCelebration" aria-live="polite" hidden>
        <div class="celebration-card">
          <div class="celebration-icon"><i data-lucide="party-popper"></i></div>
          <p class="eyebrow">Visited</p>
          <h2>Yeayy, kita udah ke tempat ini!</h2>
          <p id="celebrationPlaceName"></p>
        </div>
        <span class="confetti c1"></span>
        <span class="confetti c2"></span>
        <span class="confetti c3"></span>
        <span class="confetti c4"></span>
        <span class="confetti c5"></span>
        <span class="confetti c6"></span>
        <span class="confetti c7"></span>
        <span class="confetti c8"></span>
        <span class="confetti c9"></span>
        <span class="confetti c10"></span>
        <span class="confetti c11"></span>
        <span class="confetti c12"></span>
        <span class="confetti c13"></span>
        <span class="confetti c14"></span>
        <span class="confetti c15"></span>
        <span class="confetti c16"></span>
      </section>

    </main>

    <script src="https://unpkg.com/lucide@1.25.0/dist/umd/lucide.min.js" integrity="sha384-UoXAhqcCCjwD94x4CCSExEHvtO49AfNiY7g/IxDgrPtx4U6o6tvy1cScx9v/RrS9" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.7" integrity="sha384-BmlQlKlDvXvKoxkn5OQuUo/aJQCTXeB+Kls6EccBmG4Kf8AXvp89RtO9MtPxP/r5" crossorigin="anonymous"></script>
    <script src="js/config.js"></script>
    <script src="js/data.js"></script>
    <script src="js/details.js"></script>
  </body>
</html>
