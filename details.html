<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Place detail for Place To Go.">
    <title>Place Detail - Place To Go</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body class="detail-page">
    <main class="app-shell detail-shell">
      <nav class="topbar detail-topbar" aria-label="Primary">
        <a class="icon-link" href="home.html" aria-label="Back to places">
          <i data-lucide="arrow-left"></i>
        </a>
        <a class="brand compact" href="home.html">
          <span class="brand-mark"><i data-lucide="compass"></i></span>
          <span>Place To Go</span>
        </a>
      </nav>

      <section class="status-message" id="detailStatus" hidden></section>
      <article class="detail-view" id="detailView" hidden>
        <div class="detail-cover-wrap">
          <img class="detail-cover" id="detailCover" src="" alt="">
          <span class="status-badge detail-badge" id="detailBadge"></span>
        </div>

        <section class="detail-content">
          <div class="place-meta">
            <span class="category-pill" id="detailCategory"></span>
            <span class="location-text"><i data-lucide="map-pin"></i><span id="detailLocation"></span></span>
          </div>
          <h1 id="detailName"></h1>
          <p class="description large" id="detailDescription"></p>
          <dl class="detail-facts">
            <div>
              <dt>Status</dt>
              <dd id="detailStatusText"></dd>
            </div>
            <div>
              <dt>Created</dt>
              <dd id="detailCreated"></dd>
            </div>
          </dl>
          <dl class="detail-facts visit-facts" id="visitFacts" hidden>
            <div>
              <dt>Visited date</dt>
              <dd id="detailVisitedDate"></dd>
            </div>
            <div>
              <dt>Rating</dt>
              <dd id="detailRatings"></dd>
            </div>
          </dl>

          <div class="detail-actions">
            <a class="button primary" id="detailMaps" href="#" target="_blank" rel="noreferrer">
              <i data-lucide="map"></i>
              <span>Open Google Maps</span>
            </a>
            <button class="button visited-action" id="detailVisitedButton" type="button">
              <i data-lucide="check-circle-2"></i>
              <span>Visited</span>
            </button>
          </div>

        </section>
      </article>

      <section class="visit-sheet" id="visitSheet" hidden>
        <button class="sheet-backdrop" id="visitSheetBackdrop" type="button" aria-label="Close visited form"></button>
        <form class="visit-form sheet-panel" id="visitForm">
          <div class="sheet-handle"></div>
          <div class="sheet-title">
            <p class="eyebrow">Visited moment</p>
            <h2>Kapan kita ke sini?</h2>
          </div>
          <label class="visit-date-field">
            <span>Tanggal kunjungan</span>
            <input id="visitedDateInput" type="date" required>
          </label>
          <fieldset class="rating-picker" data-person="fiqry">
            <legend>Rating Fiqry</legend>
            <div class="rating-buttons">
              <button type="button" data-rating="1" aria-label="Fiqry rating 1">★</button>
              <button type="button" data-rating="2" aria-label="Fiqry rating 2">★</button>
              <button type="button" data-rating="3" aria-label="Fiqry rating 3">★</button>
              <button type="button" data-rating="4" aria-label="Fiqry rating 4">★</button>
              <button type="button" data-rating="5" aria-label="Fiqry rating 5">★</button>
            </div>
          </fieldset>
          <fieldset class="rating-picker" data-person="isyana">
            <legend>Rating Isyana</legend>
            <div class="rating-buttons">
              <button type="button" data-rating="1" aria-label="Isyana rating 1">★</button>
              <button type="button" data-rating="2" aria-label="Isyana rating 2">★</button>
              <button type="button" data-rating="3" aria-label="Isyana rating 3">★</button>
              <button type="button" data-rating="4" aria-label="Isyana rating 4">★</button>
              <button type="button" data-rating="5" aria-label="Isyana rating 5">★</button>
            </div>
          </fieldset>
          <div class="sheet-actions">
            <button class="button secondary" id="cancelVisitButton" type="button">Cancel</button>
            <button class="button primary" id="saveVisitButton" type="submit">
              <i data-lucide="save"></i>
              <span>Save</span>
            </button>
          </div>
        </form>
      </section>

      <section class="visited-celebration" id="visitedCelebration" aria-live="polite" hidden>
        <div class="celebration-card">
          <div class="celebration-icon"><i data-lucide="party-popper"></i></div>
          <p class="eyebrow">Visited</p>
          <h2>Yeayy, kita udah ke tempat ini!</h2>
          <p id="celebrationPlaceName"></p>
        </div>
        <span class="confetti c1"></span>
        <span class="confetti c2"></span>
        <span class="confetti c3"></span>
        <span class="confetti c4"></span>
        <span class="confetti c5"></span>
        <span class="confetti c6"></span>
        <span class="confetti c7"></span>
        <span class="confetti c8"></span>
      </section>
    </main>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/data.js"></script>
    <script src="js/details.js"></script>
  </body>
</html>
