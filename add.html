<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Add a new place to Place To Go.">
    <title>Add Place - Place To Go</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body>
    <main class="app-shell detail-shell">
      <nav class="topbar detail-topbar" aria-label="Primary">
        <a class="icon-link" href="index.html" aria-label="Back to places">
          <i data-lucide="arrow-left"></i>
        </a>
        <a class="brand compact" href="index.html">
          <span class="brand-mark"><i data-lucide="compass"></i></span>
          <span>Place To Go</span>
        </a>
      </nav>

      <section class="add-hero">
        <p class="eyebrow">Add place</p>
        <h1 id="formTitle">Save a new place for later.</h1>
        <p class="intro-copy">Upload a photo from your gallery and save the place directly to Supabase.</p>
      </section>

      <section class="status-message" id="addStatus" hidden></section>

      <form class="place-form" id="placeForm">
        <label>
          <span>Name</span>
          <input id="nameInput" name="name" type="text" placeholder="Ubud Art Market" required>
        </label>
        <label>
          <span>Location</span>
          <input id="locationInput" name="location" type="text" placeholder="Ubud, Bali" required>
        </label>
        <label>
          <span>Category</span>
          <select id="categoryInput" name="category" required>
            <option value="Beach">Beach</option>
            <option value="Cafe">Cafe</option>
            <option value="City Walk">City Walk</option>
            <option value="Culture">Culture</option>
            <option value="Food">Food</option>
            <option value="Nature">Nature</option>
            <option value="Stay">Stay</option>
            <option value="Other">Other</option>
          </select>
        </label>
        <label>
          <span>Description</span>
          <textarea id="descriptionInput" name="description" rows="4" placeholder="A quiet place for a slow morning walk." required></textarea>
        </label>
        <label>
          <span>Google Maps URL</span>
          <input id="mapsInput" name="maps_url" type="url" placeholder="https://www.google.com/maps/place/..." required>
        </label>
        <label>
          <span>Target date</span>
          <input id="targetDateInput" name="target_date" type="date">
        </label>
        <label>
          <span>Status</span>
          <select id="statusInput" name="status" required>
            <option value="wishlist">Wishlist</option>
            <option value="visited">Visited</option>
          </select>
        </label>
        <label>
          <span>Photo</span>
          <input id="imageInput" name="image" type="file" accept="image/*">
        </label>
        <button class="button primary wide-button" id="savePlaceButton" type="submit">
          <i data-lucide="save"></i>
          <span>Save Place</span>
        </button>
        <button class="button secondary wide-button" id="logoutButton" type="button">
          <i data-lucide="log-out"></i>
          <span>Logout</span>
        </button>
      </form>
    </main>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/data.js"></script>
    <script src="js/add.js"></script>
  </body>
</html>
